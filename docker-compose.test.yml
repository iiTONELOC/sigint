# ── Test Docker Compose ───────────────────────────────────────────────
#
# Run all tests in a clean container:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#
# Run specific test file:
#   docker compose -f docker-compose.test.yml run --rm test bun test tests/panes/PaneMobile.test.tsx
#
# The test service uses the same base image and deps as dev but only
# runs tests — no server, no Caddy, no volumes.

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
    command: bun test
    # No volumes — tests run against the COPY'd source, same as CI would.
    # Override command to run specific tests as needed.
