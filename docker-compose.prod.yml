services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    restart: always
    command: bun src/index.prod.ts
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const port = process.env.PORT; const res = await fetch('http://localhost:' + port); process.exit(res.ok ? 0 : 1);",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
