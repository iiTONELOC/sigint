# ── Production Docker Compose ─────────────────────────────────────────
#
# Default (Heroku): just the app on PORT, no TLS.
#   docker compose -f docker-compose.prod.yml up
#
# Self-hosted with TLS: set ENABLE_TLS=true and DOMAIN in .env
#   ENABLE_TLS=true DOMAIN=sigint.example.com docker compose -f docker-compose.prod.yml --profile tls up
#
# The "tls" profile gates the Caddy service — it only starts when
# you pass --profile tls. Without it, Caddy doesn't exist and the
# app runs exactly as before on Heroku.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    restart: always
    command: bun src/server/index.prod.ts
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "const port = process.env.PORT; const res = await fetch('http://localhost:' + port); process.exit(res.ok ? 0 : 1);",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:alpine
    profiles:
      - tls
    ports:
      - "443:443"
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - PORT=${PORT:-3000}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: always

volumes:
  caddy_data:
  caddy_config: