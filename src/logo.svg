<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1a2a"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#1e4060" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#1e4060" stroke-width="0.5" opacity="0.4"/>
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#00d4f0" stroke-width="1" opacity="0.15"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#00d4f0" stroke-width="0.8" opacity="0.12"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#00d4f0" stroke-width="0.6" opacity="0.08"/>
  <!-- Sweep glow -->
  <path d="M32,32 L32,6 A26,26 0 0,1 54.5,18.5 Z" fill="url(#glow)" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#00d4f0"/>
  <circle cx="32" cy="32" r="4" fill="none" stroke="#00d4f0" stroke-width="0.8" opacity="0.5"/>
  <!-- Signal blips -->
  <circle cx="40" cy="22" r="1.8" fill="#00d4f0" opacity="0.9"/>
  <circle cx="23" cy="38" r="1.3" fill="#ffcc00" opacity="0.8"/>
  <circle cx="44" cy="40" r="1.1" fill="#66ff44" opacity="0.7"/>
  <!-- Outer accent ring -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#00d4f0" stroke-width="0.5" opacity="0.15"/>
</svg>